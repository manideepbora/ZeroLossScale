apiVersion: v1
kind: ServiceAccount
metadata:
  name: controlplane
  namespace: nats-poc
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: controlplane-scaler
  namespace: nats-poc
rules:
  # Read and patch the consumer StatefulSet for scaling.
  - apiGroups: ["apps"]
    resources: ["statefulsets", "statefulsets/scale"]
    verbs: ["get", "patch"]
  # Read consumer pods for status reporting.
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: controlplane-scaler
  namespace: nats-poc
subjects:
  - kind: ServiceAccount
    name: controlplane
    namespace: nats-poc
roleRef:
  kind: Role
  name: controlplane-scaler
  apiGroup: rbac.authorization.k8s.io
